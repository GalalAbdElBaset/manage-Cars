<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage-Cars - Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="light">
    <div id="crmLoader" class="crm-loader">
        <div class="loader-card">
            <div class="loader-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="loader-title">CRM Pro</div>
            <div class="loader-sub">Loading, please wait</div>
            <div class="loader-animation">
                <div class="spinner-section">
                    <div class="circle-spin"></div>
                    <div class="dot-pulse">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill"></div>
                </div>
                <div style="font-size:0.85rem; color:#94a3b8; margin-top:0.5rem;">
                    <i class="fa-regular fa-clock"></i> Just a moment...
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    
    <main id="app">
        <!-- Search Screen -->
        <section class="screen active" id="search-screen">
            <div class="screen-header">
                <h2>
                    <i class="fa-solid fa-magnifying-glass"></i> Search
                </h2>
            </div>
            <div class="content">
                <div class="search-box-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search for clients, requests, cars..." autocomplete="off" />
                </div>
                
                <div class="search-filters">
                    <div class="filter-row">
                        <select id="search-type" class="filter-select">
                            <option value="">All</option>
                            <option value="client">Clients</option>
                            <option value="request">Requests</option>
                            <option value="car">Cars</option>
                        </select>
                        <select id="search-status" class="filter-select">
                            <option value="">All Statuses</option>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-secondary" id="clear-search-filters">
                        <i class="fa-solid fa-filter-circle-xmark"></i> Clear Filters
                    </button>
                </div>
                
                <div class="search-results-header">
                    <h3 id="search-results-count">Search Results</h3>
                    <div class="sort-options">
                        <select id="search-sort" class="sort-select">
                            <option value="relevance">Most Relevant</option>
                            <option value="name_asc">Name A-Z</option>
                            <option value="name_desc">Name Z-A</option>
                            <option value="date_new">Newest First</option>
                            <option value="date_old">Oldest First</option>
                        </select>
                    </div>
                </div>
                
                <div class="search-results" id="search-results">
                    <div class="empty-search-state">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <p>Enter keywords to find clients, requests, or cars</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <!-- GLOBAL BUTTONS -->
    <button type="button" class="Mood" id="theme-toggle">
        <i class="fa-solid fa-sun"></i>
    </button>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">
            <i class="fa-solid fa-users"></i> Clients
        </a>
        <a href="requests.html" class="nav-link">
            <i class="fa-solid fa-file-lines"></i> Requests
        </a>
        <a href="cars.html" class="nav-link">
            <i class="fa-solid fa-car"></i> Cars
        </a>
        <a href="search.html" class="nav-link active">
            <i class="fa-solid fa-magnifying-glass"></i> Search
        </a>
    </nav>
    
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
