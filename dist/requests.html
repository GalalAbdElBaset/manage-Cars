<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage-Cars - Requests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="light">
    <div id="crmLoader" class="crm-loader">
        <div class="loader-card">
            <div class="loader-icon">
                <i class="fa-solid fa-file-lines"></i>
            </div>
            <div class="loader-title">CRM Pro</div>
            <div class="loader-sub">Loading, please wait</div>
            <div class="loader-animation">
                <div class="spinner-section">
                    <div class="circle-spin"></div>
                    <div class="dot-pulse">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill"></div>
                </div>
                <div style="font-size:0.85rem; color:#94a3b8; margin-top:0.5rem;">
                    <i class="fa-regular fa-clock"></i> Just a moment...
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    
    <main id="app">
        <!-- Requests List Section -->
        <section class="screen active" id="requests-list">
            <div class="screen-header">
                <h2>
                    <i class="fa-solid fa-file-lines"></i> Requests
                </h2>
            </div>
            <div class="content" id="requests-container">
                <!-- Requests will be dynamically injected here -->
            </div>
        </section>
        
        <!-- Add Request Form -->
        <section class="screen" id="add-request" style="display: none;">
            <div class="screen-header">
                <button type="button" class="btn-back" id="back-from-add-request">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <h2>Add Request</h2>
            </div>
            <div class="content">
                <form id="add-request-form" onsubmit="return false;">
                    <div class="form-group">
                        <label>Client</label>
                        <select id="request-client" required>
                            <option value="" disabled selected>Select client</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Car</label>
                        <select id="request-car" required>
                            <option value="" disabled selected>Select car</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="request-status" required>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="request-notes" placeholder="Notes" rows="3"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancel-add-request">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="save-request">Save</button>
                    </div>
                </form>
            </div>
        </section>
        
        <!-- Request Details Section -->
        <section class="screen" id="request-details" style="display: none;">
            <div class="screen-header">
                <button type="button" class="btn-back" id="back-from-request-details">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <h2>Request Details</h2>
            </div>
            <div class="content" id="request-details-container">
                <!-- Details injected dynamically -->
            </div>
        </section>
        
        <!-- Edit Request Form -->
        <section class="screen" id="edit-request" style="display: none;">
            <div class="screen-header">
                <button type="button" class="btn-back" id="back-from-edit-request">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <h2>Edit Request</h2>
            </div>
            <div class="content">
                <form id="edit-request-form" onsubmit="return false;">
                    <div class="form-group">
                        <label>Client</label>
                        <select id="edit-request-client" required>
                            <option value="" disabled selected>Select client</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Car</label>
                        <select id="edit-request-car" required>
                            <option value="" disabled selected>Select car</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="edit-request-status" required>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="edit-request-notes" placeholder="Notes" rows="3"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancel-edit-request">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="update-request">Update</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    
    <!-- GLOBAL BUTTONS -->
    <button type="button" class="Mood" id="theme-toggle">
        <i class="fa-solid fa-sun"></i>
    </button>
    
    <button type="button" class="fab" id="fab-add">
        <i class="fa-solid fa-plus"></i>
    </button>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">
            <i class="fa-solid fa-users"></i> Clients
        </a>
        <a href="requests.html" class="nav-link active">
            <i class="fa-solid fa-file-lines"></i> Requests
        </a>
        <a href="cars.html" class="nav-link">
            <i class="fa-solid fa-car"></i> Cars
        </a>
        <a href="search.html" class="nav-link">
            <i class="fa-solid fa-magnifying-glass"></i> Search
        </a>
    </nav>
    
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/requests.js"></script>
</body>
</html>
