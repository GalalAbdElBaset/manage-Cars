<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mobile CRM UI</title>

        <!-- 
            Fonts & Icons
            -->
        <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
        <link rel="stylesheet" href="css/main.css" />
</head>

<body class="light">
        <!-- Toast notifications placeholder -->
        <div id="toast"></div>

        <main id="app">
        <!-- 
            CLIENTS SECTION
                -->
        <!-- Clients List Screen -->
        <section class="screen active" data-screen="clients-list">
            <div class="screen-header">
            <h2><i class="fa-solid fa-users"></i> Clients</h2>
            </div>
            <div class="content">
            <!-- Clients will be dynamically injected here -->
            </div>
        </section>

        <!-- Add Client Screen -->
        <section class="screen" data-screen="add-client">
            <div class="screen-header">
            <h2>Add Client</h2>
            </div>
            <div class="content">
            <!-- Simple form for adding a client -->
            <input  id="add-client-name" placeholder="Client Name" />
            <select id="country-code">
                <option value="+20">🇪🇬 +20</option>
                <option value="+966">🇸🇦 +966</option>
                <option value="+971">🇦🇪 +971</option>
            </select>

            <input id="add-client-phone" placeholder="Phone number">
            <input  id="add-client-notes" placeholder="Notes" />
            <button type="button" class="btn btn-primary" id="save-client">
                <i class="fa-solid fa-check"></i> Save
            </button>
            </div>
        </section>

        <!-- Client Details Screen -->
        <section class="screen" data-screen="client-details">
            <div class="screen-header">
            <h2>Client Details</h2>
            </div>
            <div class="content">
            <div class="card">
                <!-- Details injected dynamically -->
            </div>
            <button type="button" class="btn btn-secondary" >
                <i class="fa-solid fa-phone"></i> Call
            </button>
            <button type="button" class="btn btn-secondary" >
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </button>
            <button type="button" class="btn btn-warning" data-edit-client="" >
                <i class="fa-solid fa-pen"></i> Edit
            </button>
            </div>
        </section>

        <!-- Edit Client Screen -->
        <section class="screen" data-screen="edit-client">
            <div class="screen-header">
                <h2>Edit Client</h2>
            </div>
            <div class="content">
                <input id="edit-client-name" placeholder="Client Name" />
                <select id="edit-country-code">
                    <option value="+20">🇪🇬 +20</option>
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                </select>
                <input id="edit-client-phone" placeholder="Phone number" />
                <input id="edit-client-notes" placeholder="Notes" />
                <button type="button" class="btn btn-primary" id="update-client">
                    <i class="fa-solid fa-check"></i> Update
                </button>
            </div>
        </section>

        <!-- 
            REQUESTS SECTION
                -->
      <!-- 
    REQUESTS SECTION
-->
<!-- 
    REQUESTS SECTION
-->
<section class="screen" data-screen="requests-list">
    <div class="screen-header">
        <h2><i class="fa-solid fa-file-lines"></i> Requests</h2>
    </div>
    <div class="content">
        <!-- Requests will be dynamically injected here -->
    </div>
</section>

<!-- Add Request Screen -->
<section class="screen" data-screen="add-request">
    <div class="screen-header">
        <h2>Add Request</h2>
    </div>
    <div class="content">
        <select id="request-client">
            <option value="" disabled selected>Select Client</option>
            <!-- Clients dynamically loaded -->
        </select>
        
        <select id="request-car">
            <option value="" disabled selected>Select Car</option>
            <!-- Cars dynamically loaded -->
        </select>
        
        <select id="request-status">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
        </select>
        
        <button type="button" class="btn btn-primary" data-save-request>
            Save
        </button>
    </div>
</section>

<!-- Request Details Screen -->
<section class="screen" data-screen="request-details">
    <div class="screen-header">
        <h2>Request Details</h2>
    </div>
    <div class="content">
        <div class="card">
            <p><strong>Client:</strong> <span id="details-client"></span></p>
            <p><strong>Car:</strong> <span id="details-car"></span></p>
            <p><strong>Status:</strong> <span id="details-status"></span></p>
        </div>
        <button type="button" class="btn btn-warning" data-edit-request="">
            <i class="fa-solid fa-pen"></i> Edit
        </button>
        <button type="button" class="btn btn-danger" data-delete-request="">
            <i class="fa-solid fa-trash"></i> Delete
        </button>
    </div>
</section>

<!-- Edit Request Screen -->
<section class="screen" data-screen="edit-request">
    <div class="screen-header">
        <h2>Edit Request</h2>
    </div>
    <div class="content">
        <select id="edit-request-client">
            <option value="" disabled selected>Select Client</option>
            <!-- Clients dynamically loaded -->
        </select>
        
        <select id="edit-request-car">
            <option value="" disabled selected>Select Car</option>
            <!-- Cars dynamically loaded -->
        </select>
        
        <select id="edit-request-status">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
        </select>
        
        <button type="button" class="btn btn-primary" id="update-request">
            Update
        </button>
    </div>
</section>
        <!-- 
    CARS SECTION
-->
<section class="screen" data-screen="cars-list">
    <div class="screen-header">
        <h2><i class="fa-solid fa-car"></i> Cars</h2>
    </div>
    <div class="content">
        <!-- Cars dynamically injected -->
    </div>
</section>

<!-- Add Car Screen -->
<section class="screen" data-screen="add-car">
    <div class="screen-header">
        <h2>Add Car</h2>
    </div>
    <div class="content">
        <input id="add-car-brand" placeholder="Brand" required/>
        <input id="add-car-model" placeholder="Model" required/>
        <input id="add-car-year" placeholder="Year" type="number" required/>
        <select id="add-car-condition" required>
            <option value="">Select Condition</option>
            <option value="Excellent">Excellent</option>
            <option value="Very Good">Very Good</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
            <option value="Needs Repair">Needs Repair</option>
        </select>
        <input id="add-car-paint" placeholder="Paint Color" required/>
        <select id="add-car-category" required>
            <option value="">Select Category</option>
            <option value="Sedan">Sedan</option>
            <option value="SUV">SUV</option>
            <option value="Hatchback">Hatchback</option>
            <option value="Coupe">Coupe</option>
            <option value="Convertible">Convertible</option>
            <option value="Wagon">Wagon</option>
            <option value="Van">Van</option>
            <option value="Truck">Truck</option>
        </select>
        <input id="add-car-price" placeholder="Price" required/>
        <button type="button" class="btn btn-primary" id="save-car">
            Save
        </button>
    </div>
</section>

    <!-- Edit Car Screen -->
    <section class="screen" data-screen="edit-car">
        <div class="screen-header">
            <h2><i class="fa-solid fa-pen"></i> Edit Car</h2>
        </div>
        <div class="content">
            <input id="edit-car-brand" placeholder="Brand" required/>
            <input id="edit-car-model" placeholder="Model" required/>
            <input id="edit-car-year" placeholder="Year" type="number" required/>
            <select id="edit-car-condition" required>
                <option value="">Select Condition</option>
                <option value="Excellent">Excellent</option>
                <option value="Very Good">Very Good</option>
                <option value="Good">Good</option>
                <option value="Fair">Fair</option>
                <option value="Needs Repair">Needs Repair</option>
            </select>
            <input id="edit-car-paint" placeholder="Paint Color" required/>
            <select id="edit-car-category" required>
                <option value="">Select Category</option>
                <option value="Sedan">Sedan</option>
                <option value="SUV">SUV</option>
                <option value="Hatchback">Hatchback</option>
                <option value="Coupe">Coupe</option>
                <option value="Convertible">Convertible</option>
                <option value="Wagon">Wagon</option>
                <option value="Van">Van</option>
                <option value="Truck">Truck</option>
            </select>
            <input id="edit-car-price" placeholder="Price" required/>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" class="btn btn-secondary" onclick="cancelEditCar()">
                    Cancel
                </button>
                <button type="button" class="btn btn-primary" id="update-car">
                    Update Car
                </button>
            </div>
        </div>
    </section>

        <section class="screen" data-screen="search">
            <div class="screen-header">
                <h2><i class="fa-solid fa-magnifying-glass"></i> Search</h2>
            </div>
            <div class="content">
                <!-- Search Box -->
                <div class="search-box-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search clients, requests, cars..." 
                        autocomplete="off"
                    />
                </div>

                <!-- Search Filters -->
                <div class="search-filters">
                    <div class="filter-row">
                        <select id="search-type" class="filter-select">
                            <option value="">All Types</option>
                            <option value="client">Clients</option>
                            <option value="request">Requests</option>
                            <option value="car">Cars</option>
                        </select>
                        
                        <select id="search-status" class="filter-select">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    
                    <button type="button" class="btn btn-secondary" id="clear-search-filters">
                        <i class="fa-solid fa-filter-circle-xmark"></i> Clear Filters
                    </button>
                </div>

                <!-- Search Results -->
                <div class="search-results-header">
                    <h3 id="search-results-count">Search Results</h3>
                    <div class="sort-options">
                        <select id="search-sort" class="sort-select">
                            <option value="relevance">Relevance</option>
                            <option value="name_asc">Name A-Z</option>
                            <option value="name_desc">Name Z-A</option>
                            <option value="date_new">Newest First</option>
                            <option value="date_old">Oldest First</option>
                        </select>
                    </div>
                </div>

                <div class="search-results" id="search-results">
                    <!-- Results will be dynamically injected here -->
                    <div class="empty-search-state">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <p>Enter search terms to find clients, requests, or cars</p>
                    </div>
                </div>
            </div>
        </section>
        <section class="screen" data-screen="settings">
            <div class="screen-header">
            <h2>Settings</h2>
            </div>
            <div class="content">
            <!-- Settings content goes here -->
            </div>
        </section>
        </main>

        <!-- GLOBAL BUTTONS -->
        <!-- Mood Toggle -->
        <button type="button" class="Mood">
        <i class="fa-solid fa-sun"></i>
        </button>

        <!-- Floating Add Button -->
        <button type="button" class="fab" data-go="add-client">
        <i class="fa-solid fa-plus"></i>
        </button>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
        <button type="button" data-go="clients-list">
            <i class="fa-solid fa-users"></i> Clients
        </button>
        <button type="button" data-go="requests-list">
            <i class="fa-solid fa-file-lines"></i> Requests
        </button>
        <button type="button" data-go="cars-list">
            <i class="fa-solid fa-car"></i> Cars
        </button>
        <button type="button" data-go="search">
            <i class="fa-solid fa-magnifying-glass"></i> Search
        </button>
        </nav>

        <!--SCRIPTS-->

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cars.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/requests.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
